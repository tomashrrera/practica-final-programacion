name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Optional: Add a DB service here if we move to PostgreSQL later for the MH grade
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install backend dependencies
        if [ -f fastapi/requirements.txt ]; then pip install -r fastapi/requirements.txt; fi
        # Install frontend dependencies (for utility tests)
        if [ -f streamlit/requirements.txt ]; then pip install -r streamlit/requirements.txt; fi
        # Ensure pytest and development tools are installed
        pip install pytest pytest-cov pytest-mock httpx

    - name: Run tests with pytest
      run: |
        # Set PYTHONPATH so pytest can find the fastapi and streamlit modules
        export PYTHONPATH=$PYTHONPATH:$(pwd)/fastapi:$(pwd)/streamlit
        pytest --cov=. --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false
