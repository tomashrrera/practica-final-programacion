name: Python Testing CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Añadimos todas las librerías necesarias para que no falle por falta de paquetes
        pip install fastapi sqlalchemy pytest httpx requests pydantic

    - name: Run tests with pytest
      run: |
        # Añadimos el directorio actual al path para que encuentre la carpeta 'api'
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest