services:

  fastapi:
    build: api/
    ports:
      - 8000:8000
    networks:
      - deploy_network
    container_name: fastapi

  streamlit:
    build: streamlit/
    depends_on:
      - fastapi
    ports:
      - 8501:8501
    networks:
      - deploy_network
    container_name: streamlit
    environment:
      - API_URL=http://fastapi:8000

networks:
  deploy_network:
    driver: bridge
